<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" fill="none" role="img" aria-labelledby="migration-title migration-desc">
  <title id="migration-title">Household migration from Bay Area to Central Valley</title>
  <desc id="migration-desc">Diagram showing two-thirds of household moves between the Bay Area and Central Valley go toward the Central Valley, based on UC Davis research.</desc>
  <defs>
    <linearGradient id="flow-grad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#78716C"/>
      <stop offset="40%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="reverse-grad" x1="1" y1="0.5" x2="0" y2="0.5">
      <stop offset="0%" stop-color="#D6D3D1"/>
      <stop offset="100%" stop-color="#A8A29E"/>
    </linearGradient>
    <!-- Arrowhead markers — refX=0 so arrowhead extends FORWARD from line end -->
    <marker id="arrow-amber" viewBox="0 0 10 8" refX="0" refY="4" markerWidth="7" markerHeight="5.5" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#D97706"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 8" refX="0" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 Z" fill="#A8A29E"/>
    </marker>
  </defs>

  <!-- Background card -->
  <rect x="0" y="0" width="680" height="340" rx="16" fill="#FFFFFF"/>
  <rect x="0" y="0" width="680" height="340" rx="16" stroke="#E7E5E4" stroke-width="1"/>

  <!-- Title -->
  <text x="340" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#B45309" letter-spacing="2">HOUSEHOLD MIGRATION</text>
  <text x="340" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1C1917">Bay Area → Central Valley</text>

  <!-- Left region: Bay Area -->
  <rect x="40" y="100" width="180" height="80" rx="12" fill="#FAF9F6" stroke="#E7E5E4" stroke-width="1"/>
  <text x="130" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1C1917">Bay Area</text>
  <text x="130" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Silicon Valley · East Bay</text>

  <!-- Right region: Central Valley -->
  <rect x="460" y="100" width="180" height="80" rx="12" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1" opacity="0.6"/>
  <text x="550" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1C1917">Central Valley</text>
  <text x="550" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78716C">Modesto · Tracy · Manteca</text>

  <!-- Main flow arrow (Bay → CV) — line stops, then arrowhead extends forward -->
  <path d="M 230 125 C 295 90, 370 90, 438 120" stroke="url(#flow-grad)" stroke-width="5" fill="none" stroke-linecap="round" marker-end="url(#arrow-amber)"/>

  <!-- Reverse flow arrow (CV → Bay) — thin dashed -->
  <path d="M 448 158 C 388 188, 308 188, 242 162" stroke="url(#reverse-grad)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="6 4" marker-end="url(#arrow-gray)"/>

  <!-- Big stat -->
  <text x="340" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="56" font-weight="700" fill="#B45309">⅔</text>
  <text x="340" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#57534E">of all moves between the two regions</text>
  <text x="340" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1C1917">go toward the Central Valley</text>

  <!-- Source -->
  <text x="340" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8A29E">UC Davis Center for Regional Change · Northern California Megaregion research</text>
</svg>
