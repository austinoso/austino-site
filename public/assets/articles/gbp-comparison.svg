<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 380" fill="none" role="img" aria-labelledby="gbp-title gbp-desc">
  <title id="gbp-title">Google Business Profile comparison: bare vs. complete</title>
  <desc id="gbp-desc">Two Google Business Profile cards side by side. The left is mostly empty with no photos, missing hours, and one review. The right is fully filled out with photos, hours, reviews, and recent posts.</desc>

  <!-- Background -->
  <rect width="660" height="380" rx="16" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1"/>

  <!-- Title -->
  <text x="330" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#B45309" letter-spacing="2">GOOGLE BUSINESS PROFILE</text>
  <text x="330" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1C1917">Bare minimum vs. fully complete</text>

  <!-- LEFT CARD: Bare profile -->
  <rect x="24" y="72" width="292" height="280" rx="12" fill="#FAF9F6" stroke="#E7E5E4" stroke-width="1"/>

  <!-- Left header -->
  <rect x="24" y="72" width="292" height="36" rx="12" fill="#F5F5F4"/>
  <rect x="316" y="72" width="0" height="12" rx="0" fill="#F5F5F4"/><!-- fix bottom corners -->
  <rect x="24" y="96" width="292" height="12" fill="#F5F5F4"/>
  <text x="170" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#78716C">Valley Auto Repair</text>

  <!-- No photo placeholder -->
  <rect x="44" y="120" width="252" height="54" rx="8" fill="#E7E5E4" stroke="#D6D3D1" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="170" y="151" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A8A29E">No photos added</text>

  <!-- Sparse info -->
  <text x="44" y="198" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1C1917">Address</text>
  <rect x="44" y="204" width="140" height="7" rx="2" fill="#D6D3D1"/>

  <text x="44" y="228" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1C1917">Hours</text>
  <text x="44" y="242" font-family="system-ui, sans-serif" font-size="10" fill="#A8A29E">Not provided</text>

  <text x="44" y="264" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1C1917">Reviews</text>
  <text x="44" y="278" font-family="system-ui, sans-serif" font-size="10" fill="#A8A29E">1 review · no responses</text>

  <text x="44" y="300" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1C1917">Posts</text>
  <text x="44" y="314" font-family="system-ui, sans-serif" font-size="10" fill="#A8A29E">None</text>

  <!-- Low score indicator -->
  <rect x="44" y="330" width="252" height="14" rx="4" fill="#FEF2F2"/>
  <text x="170" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#DC2626">Profile strength: weak</text>

  <!-- RIGHT CARD: Complete profile -->
  <rect x="344" y="72" width="292" height="280" rx="12" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1" opacity="0.85"/>

  <!-- Right header -->
  <rect x="344" y="72" width="292" height="36" rx="12" fill="#B45309"/>
  <rect x="344" y="96" width="292" height="12" fill="#B45309"/>
  <text x="490" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">Valley Auto Repair</text>

  <!-- Photo thumbnails -->
  <rect x="364" y="120" width="58" height="54" rx="6" fill="#D6D3D1"/>
  <rect x="428" y="120" width="58" height="54" rx="6" fill="#C4B5A3"/>
  <rect x="492" y="120" width="58" height="54" rx="6" fill="#D6D3D1"/>
  <rect x="556" y="120" width="58" height="54" rx="6" fill="#C4B5A3"/>
  <text x="490" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78716C">12 photos</text>

  <!-- Full info -->
  <text x="364" y="208" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1C1917">Address</text>
  <text x="364" y="222" font-family="system-ui, sans-serif" font-size="10" fill="#57534E">1240 McHenry Ave, Modesto, CA</text>

  <text x="364" y="242" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1C1917">Hours</text>
  <text x="364" y="256" font-family="system-ui, sans-serif" font-size="10" fill="#57534E">Mon-Fri 7:30am-5:30pm · Open now</text>

  <text x="364" y="276" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1C1917">Reviews</text>
  <text x="364" y="290" font-family="system-ui, sans-serif" font-size="10" fill="#57534E">47 reviews · all responded to</text>
  <!-- Stars -->
  <text x="500" y="276" font-family="system-ui, sans-serif" font-size="10" fill="#D97706">★★★★★</text>

  <text x="364" y="310" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#1C1917">Latest post</text>
  <text x="364" y="324" font-family="system-ui, sans-serif" font-size="10" fill="#57534E">"Summer AC checks — $49 through July"</text>

  <!-- Strong score indicator -->
  <rect x="364" y="336" width="252" height="14" rx="4" fill="#F0FDF4"/>
  <text x="490" y="346" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#16A34A">Profile strength: strong</text>
</svg>