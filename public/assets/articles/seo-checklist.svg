<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" fill="none" role="img" aria-labelledby="checklist-title checklist-desc">
  <title id="checklist-title">Local SEO quick wins checklist</title>
  <desc id="checklist-desc">A four-item checklist of actions a business can take this week to improve local search rankings: update Google Business Profile, search your business name for NAP consistency, ask recent customers for reviews, and test your site on mobile.</desc>

  <!-- Background -->
  <rect width="520" height="340" rx="16" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1"/>

  <!-- Title -->
  <text x="260" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#B45309" letter-spacing="2">THIS WEEK</text>
  <text x="260" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1C1917">Four things you can do right now</text>

  <!-- Item 1 -->
  <rect x="32" y="76" width="456" height="52" rx="10" fill="#FAF9F6" stroke="#E7E5E4" stroke-width="1"/>
  <rect x="48" y="92" width="22" height="22" rx="6" fill="#B45309"/>
  <text x="59" y="107" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">1</text>
  <text x="84" y="100" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1917">Update your Google Business Profile</text>
  <text x="84" y="116" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Add 3-5 new photos and write a post about what you're offering this month</text>

  <!-- Item 2 -->
  <rect x="32" y="140" width="456" height="52" rx="10" fill="#FAF9F6" stroke="#E7E5E4" stroke-width="1"/>
  <rect x="48" y="156" width="22" height="22" rx="6" fill="#B45309"/>
  <text x="59" y="171" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">2</text>
  <text x="84" y="164" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1917">Search your business name</text>
  <text x="84" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Make sure the address and phone number match everywhere it shows up</text>

  <!-- Item 3 -->
  <rect x="32" y="204" width="456" height="52" rx="10" fill="#FAF9F6" stroke="#E7E5E4" stroke-width="1"/>
  <rect x="48" y="220" width="22" height="22" rx="6" fill="#B45309"/>
  <text x="59" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">3</text>
  <text x="84" y="228" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1917">Ask 3 happy customers for a review</text>
  <text x="84" y="244" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Then respond to every review you already have</text>

  <!-- Item 4 -->
  <rect x="32" y="268" width="456" height="52" rx="10" fill="#FAF9F6" stroke="#E7E5E4" stroke-width="1"/>
  <rect x="48" y="284" width="22" height="22" rx="6" fill="#B45309"/>
  <text x="59" y="299" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">4</text>
  <text x="84" y="292" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1917">Test your site on your phone</text>
  <text x="84" y="308" font-family="system-ui, sans-serif" font-size="10" fill="#78716C">Time the load, check the buttons. If anything is off, that's a ranking problem.</text>
</svg>